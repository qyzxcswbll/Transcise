<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcise - 翻译助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- ====== 头部 ====== -->
    <header class="popup-header">
      <h1>🌐 Transcise</h1>
      <p class="popup-subtitle">Markdown 翻译助手</p>
    </header>

    <!-- ====== 文件上传区（主要操作） ====== -->
    <section class="upload-section">
      <div id="upload-area" class="upload-area">
        <div class="upload-icon">📄</div>
        <div class="upload-title">选择 .md 文件进行翻译</div>
        <div class="upload-hint">拖拽文件到此处，或点击下方按钮</div>
        <button id="upload-btn" class="upload-btn">📂 选择 Markdown 文件</button>
        <input type="file" id="file-input" accept=".md,.markdown,.mdown,.mkd" hidden>
      </div>
      <div id="upload-status" class="upload-status" style="display:none;">
        <span id="upload-status-text"></span>
      </div>
    </section>

    <!-- ====== 自动触发开关 ====== -->
    <div class="toggle-section">
      <div class="toggle-row">
        <div class="toggle-label">
          <span class="toggle-icon">⚡</span>
          <span>自动翻译 .md 页面</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="auto-trigger-toggle">
          <span class="switch-slider"></span>
        </label>
      </div>
      <p class="toggle-hint">开启后，浏览 .md 文件时会自动注入翻译工具栏</p>
    </div>

    <!-- ====== 折叠设置区 ====== -->
    <details class="settings-details">
      <summary class="settings-summary">
        <span class="settings-summary-text">⚙️ 翻译设置</span>
        <span class="settings-arrow">▶</span>
      </summary>
      <div class="settings-body">
        <div class="form-group">
          <label for="api-key" class="form-label">
            DeepSeek API Key
            <a href="https://platform.deepseek.com/api_keys" target="_blank" class="form-link">获取 Key →</a>
          </label>
          <div class="input-with-toggle">
            <input type="password" id="api-key" class="form-input" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
            <button type="button" id="toggle-key-visibility" class="toggle-btn" title="显示/隐藏">👁️</button>
          </div>
          <span id="api-key-status" class="form-hint"></span>
        </div>
        <div class="form-group">
          <label for="default-lang" class="form-label">目标语言</label>
          <select id="default-lang" class="form-select">
            <option value="zh">🇨🇳 中文</option>
            <option value="en">🇺🇸 English</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="ko">🇰🇷 한국어</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="es">🇪🇸 Español</option>
            <option value="ru">🇷🇺 Русский</option>
            <option value="pt">🇧🇷 Português</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="vi">🇻🇳 Tiếng Việt</option>
            <option value="th">🇹🇭 ภาษาไทย</option>
            <option value="id">🇮🇩 Bahasa Indonesia</option>
          </select>
        </div>
        <div class="form-group">
          <label for="model-select" class="form-label">翻译模型</label>
          <select id="model-select" class="form-select">
            <option value="deepseek-chat">DeepSeek-V3（推荐）</option>
            <option value="deepseek-reasoner">DeepSeek-R1</option>
          </select>
          <span class="form-hint">V3 速度更快，R1 质量更精细</span>
        </div>
        <button type="button" id="save-btn" class="save-btn">💾 保存设置</button>
        <div id="save-status" class="save-status"></div>
      </div>
    </details>

    <!-- ====== 底部 ====== -->
    <footer class="popup-footer">
      <span class="footer-text">v1.2.0</span>
    </footer>
  </div>
  <script src="../utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
