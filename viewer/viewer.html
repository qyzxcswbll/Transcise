<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcise - Markdown Viewer</title>
  <script src="../lib/marked.min.js"></script>
  <script src="../lib/mermaid.min.js"></script>
  <link rel="stylesheet" href="../content/content.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; }
    #drop-zone {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone.drag-over { background: #1a2332; }
    .drop-icon { font-size: 64px; margin-bottom: 16px; }
    .drop-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #f0f6fc; }
    .drop-subtitle { font-size: 14px; color: #8b949e; margin-bottom: 24px; }
    .drop-btn {
      display: inline-block; padding: 12px 24px;
      background: #238636; color: #fff; border: 1px solid #2ea043; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .drop-btn:hover { background: #2ea043; }
    #file-input { display: none; }
    #error-msg { margin-top: 12px; font-size: 13px; color: #f85149; display: none; }
    #viewer-area { display: none; }
    .settings-link {
      position: fixed; bottom: 16px; right: 16px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      background: #21262d; border: 1px solid #30363d; border-radius: 8px;
      color: #8b949e; text-decoration: none; font-size: 18px; transition: background 0.15s;
      z-index: 100;
    }
    .settings-link:hover { background: #30363d; color: #f0f6fc; }

    /* 预览/翻译切换按钮组 */
    .transcise-view-toggle { display: flex; border: 1px solid #d1d5da; border-radius: 6px; overflow: hidden; }
    .transcise-view-toggle .transcise-mode-btn {
      padding: 6px 12px; border: none; border-right: 1px solid #d1d5da;
      background: #fff; font-size: 12px; color: #586069; cursor: pointer;
    }
    .transcise-view-toggle .transcise-mode-btn:last-child { border-right: none; }
    .transcise-view-toggle .transcise-mode-btn:hover { background: #f3f4f6; }
    .transcise-view-toggle .transcise-mode-btn.active { background: #0366d6; color: #fff; }

    /* 显示模式按钮禁用态 */
    .transcise-mode-btn.disabled { opacity: 0.5; cursor: not-allowed !important; pointer-events: none; }

    /* 预览模式：隐藏译文内容 */
    .transcise-markdown-body.view-preview .transcise-translation { display: none; }

    /* Mermaid SVG 响应式：防止流程图溢出变窄 */
    .transcise-markdown-body .mermaid { overflow-x: auto; }
    .transcise-markdown-body .mermaid svg { max-width: 100%; height: auto; }
  </style>
</head>
<body>
  <div id="drop-zone">
    <div class="drop-icon">📄</div>
    <div class="drop-title">Transcise v1.2.0 — Markdown Translator</div>
    <div class="drop-subtitle">Drag a .md file here, or click to browse</div>
    <label class="drop-btn" for="file-input">📂 Open Markdown File</label>
    <input type="file" id="file-input" accept=".md,.markdown,.mdown,.mkd">
    <div id="error-msg"></div>
    <div class="drop-subtitle" style="margin-top: 16px; font-size: 12px;">也可在弹窗中选择文件直接打开</div>
  </div>
  <div id="viewer-area"></div>
  <a class="settings-link" href="../popup/popup.html" title="设置">⚙</a>
  <script src="../utils/storage.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
